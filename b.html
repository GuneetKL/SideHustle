<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Side Hustle</title>
    <link rel="stylesheet" href="s.css">
   
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: black; 
            color: #343a40; 
        }
        header {
            background-color: #333; 
            padding: 20px 0;
            position: fixed;
            width: 100%;
            z-index: 999;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1); 
        }
        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo img {
            max-width: 100px; 
            margin-right: 10px; 
        }
        .companyinfo {
            text-align: left;
            color: #fff;
        }
        .name {
            font-weight: bold;
            font-size: 24px;
            margin: 0;
            color: #fff; 
        }
        .tag {
            font-size: 16px;
            margin-top: 5px;
        }
        main {
            padding-top: 150px; 
            text-align: center;
        }
        section {
            padding: 50px 0;
        }
        h2 {
            font-size: 24px;
            margin-bottom: 15px;
            color: #343a40; 
        }
        .j {
            display: inline-block;
            margin: 0 20px;
            cursor: pointer;
            background-color: #fff;
            padding: 20px; 
            border-radius: 10px; 
           
        }
        .j img {
            width: 150px; 
            height: auto;
            border-radius: 10px; 
            margin-bottom: 20px;
        }
        .j h3 {
            font-size: 20px;
            margin: 0;
            color: #343a40; 
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <img src="a.png" alt="Side Hustle Logo">
            <div class="companyinfo">
                <h1 class="name">Side Hustle</h1>
                <div class="tag">Seize opportunities anytime, anywhere.</div>
            </div>
        </div>
    </header>
    <main>
        <section id="findjobs">
            <div class="j">
                <a href="f.html"> 
                    <img src="12.png" alt="Find Jobs">
                    <h3>Find Jobs</h3>
                </a>
            </div>
        </section>
        <section id="postjobs">
            <div class="j">
                <a href="p.html"> 
                    <img src="13.png" alt="Post Jobs">
                    <h3>Post Jobs</h3>
                </a>
            </div>
        </section>
    </main>
</body>
</html>
